name: Beta Artifact Capture

on:
  workflow_dispatch:
  push:
    tags:
      - "beta-*"

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r flower_security_wrapper/requirements-dev.txt
          pip install -e flower_security_wrapper

      - name: Run tests for evidence
        run: |
          pytest flower_security_wrapper/tests \
            --junitxml=flower_security_wrapper/junit.xml

      - name: Build package artifacts
        run: |
          cd flower_security_wrapper
          python -m build

      - name: Capture repo artifacts
        run: |
          chmod +x scripts/capture_beta_artifacts.sh
          ./scripts/capture_beta_artifacts.sh

      - name: Upload beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-bundle
          path: |
            flower_security_wrapper/dist/*
            flower_security_wrapper/junit.xml
            docs/beta/artifacts/*
            docs/beta/BETA_RELEASE.md
            docs/beta/COMPLIANCE_EVIDENCE.md
